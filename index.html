<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BJB Bakery – Test Payment</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://checkout.squadco.com/widget/squad.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a00;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(180, 80, 0, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(210, 140, 0, 0.1) 0%, transparent 50%);
      font-family: 'DM Sans', sans-serif;
      padding: 24px;
    }

    .card {
      background: #fff8f0;
      border-radius: 20px;
      overflow: hidden;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(210,140,0,0.2);
    }

    .card-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: linear-gradient(135deg, #c8740a 0%, #e8a020 50%, #c8740a 100%);
      position: relative;
    }

    .card-img-placeholder {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #8B2500 0%, #D4620A 40%, #F0A830 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }

    .cake-icon {
      font-size: 64px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    .brand-badge {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      backdrop-filter: blur(8px);
    }

    .card-body {
      padding: 24px;
    }

    .tag {
      display: inline-block;
      background: #fef3e2;
      color: #c8740a;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      border: 1px solid #f0d0a0;
    }

    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #1a0a00;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .product-desc {
      font-size: 13px;
      color: #7a5a3a;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, #e0c090, transparent);
      margin-bottom: 16px;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .price {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #1a0a00;
      font-weight: 700;
    }

    .price span {
      font-size: 14px;
      color: #7a5a3a;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
    }

    .test-badge {
      background: #fff0d0;
      border: 1px solid #e8c070;
      color: #c8740a;
      font-size: 10px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .btn-pay {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #c8740a, #e8a020);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(200, 116, 10, 0.35);
    }

    .btn-pay:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(200, 116, 10, 0.45);
    }

    .btn-pay:active { transform: translateY(0); }

    .btn-whatsapp {
      width: 100%;
      padding: 15px;
      background: #fff;
      color: #1a7a3a;
      border: 2px solid #25D366;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-whatsapp:hover {
      background: #f0fff4;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(37, 211, 102, 0.2);
    }

    .wa-icon {
      width: 20px;
      height: 20px;
      fill: #25D366;
    }

    /* Email modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff8f0;
      border-radius: 16px;
      padding: 28px;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: #1a0a00;
      margin-bottom: 6px;
    }

    .modal p {
      font-size: 13px;
      color: #7a5a3a;
      margin-bottom: 18px;
    }

    .modal input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0c090;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #1a0a00;
      background: #fff;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .modal input:focus { border-color: #c8740a; }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 1.5px solid #e0c090;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #7a5a3a;
      cursor: pointer;
    }

    .modal-confirm {
      flex: 2;
      padding: 12px;
      background: linear-gradient(135deg, #c8740a, #e8a020);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
    }

    .error-msg {
      font-size: 12px;
      color: #c0392b;
      margin-top: -10px;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-img-placeholder">
      <div class="cake-icon">🎂</div>
      <div class="brand-badge">BJB Bakery</div>
    </div>
    <div class="card-body">
      <div class="tag">Signature Cake</div>
      <h2 class="product-name">Classic Birthday Cake</h2>
      <p class="product-desc">Moist vanilla sponge with rich buttercream frosting. Made fresh daily at our Ilorin locations.</p>
      <div class="divider"></div>
      <div class="price-row">
        <div class="price">₦100 <span>test</span></div>
        <div class="test-badge">🧪 Test Mode</div>
      </div>
      <button class="btn-pay" onclick="openEmailModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="m1 4 11 8 11-8"/></svg>
        Pay Now — ₦100
      </button>
      <a class="btn-whatsapp" href="https://wa.me/2348066309888?text=Hello%20BJB%20Bakery!%20I%20want%20to%20order%20a%20Classic%20Birthday%20Cake%20%E2%82%A6100" target="_blank">
        <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Order via WhatsApp
      </a>
    </div>
  </div>

  <!-- Email Modal -->
  <div class="modal-overlay" id="emailModal">
    <div class="modal">
      <h3>Enter your email</h3>
      <p>We'll send your order confirmation here.</p>
      <input type="email" id="customerEmail" placeholder="your@email.com" />
      <p class="error-msg" id="emailError">Please enter a valid email address.</p>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeEmailModal()">Cancel</button>
        <button class="modal-confirm" onclick="startPayment()">Continue to Pay</button>
      </div>
    </div>
  </div>

  <script>
    function openEmailModal() {
      document.getElementById('emailModal').classList.add('active');
      setTimeout(() => document.getElementById('customerEmail').focus(), 100);
    }

    function closeEmailModal() {
      document.getElementById('emailModal').classList.remove('active');
      document.getElementById('customerEmail').value = '';
      document.getElementById('emailError').style.display = 'none';
    }

    function startPayment() {
      const email = document.getElementById('customerEmail').value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailRegex.test(email)) {
        document.getElementById('emailError').style.display = 'block';
        return;
      }

      document.getElementById('emailError').style.display = 'none';
      closeEmailModal();

      const squadInstance = new squad({
        onClose: () => console.log('Payment widget closed'),
        onLoad: () => console.log('Payment widget loaded'),
        onSuccess: (data) => {
          alert('Payment successful! Thank you for your order. BJB Bakery will reach out to confirm delivery.');
          console.log('Payment success:', data);
        },
        key: "pk_ade4a05b138ff5c25a92ff0cc6b2d39782392363",
        email: email,
        amount: 100 * 100, // ₦100 in kobo
        currency_code: "NGN",
        transaction_ref: "BJB_TEST_" + Date.now(),
        customer_name: "BJB Customer"
      });

      squadInstance.setup();
      squadInstance.open();
    }

    // Allow Enter key to confirm email
    document.getElementById('customerEmail').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') startPayment();
    });
  </script>

</body>
</html>
